services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: approvals
      POSTGRES_USER: approval_user
      POSTGRES_PASSWORD: approval_pass
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U approval_user -d approvals" ]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3002:3002"
    volumes:
      - uploads:/app/uploads
    env_file: ./apps/backend/.env
    environment:
      DATABASE_URL: postgresql://approval_user:approval_pass@db:5432/approvals
      FRONTEND_URL: http://localhost:5173

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        VITE_API_URL: http://localhost:3002
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  pgdata:
  uploads:
